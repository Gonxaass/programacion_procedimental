<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bulma@1.0.4/css/bulma.min.css"
    />
    <title>pedidos</title>
</head>
<body>
  <section class="section">
    <div class="container" style="max-width: 500px;">
      <h1 class="title has-text-centered">Detalles del Pedido</h1>
      

      <div class="field">
        <label class="label">Nombre de Usuario</label>
        <div class="control">
          <input class="input" type="text" placeholder="Ingresa tu nombre completo">
        </div>
      </div>


      <div class="field">
        <label class="label">producto</label>
        <div class="control">
          <input class="input" type="text" placeholder="Ingresa el nombre del producto">
        </div>
      </div>



      <div class="field">
        <label class="label">Cantidad</label>
        <div class="control">
          <input class="input" type="number" min="1" placeholder="Cantidad">
        </div>
      </div>


      <div class="field">
        <label class="label">Dirección</label>
        <div class="control">
          <input class="input" type="text" placeholder="Dirección de entrega">
        </div>
      </div>


      <div class="field">
        <label class="label">Teléfono</label>
        <div class="control">
          <input class="input" type="tel" placeholder="Número celular o fijo">
        </div>
      </div>


      <div class="field">
        <label class="label">Método de Pago</label>
        <div class="control">
          <label class="radio">
            <input type="radio" name="metodo_pago" checked> Efectivo
          </label>
          <label class="radio">
            <input type="radio" name="metodo_pago"> Tarjeta
          </label>
          <label class="radio">
            <input type="radio" name="metodo_pago"> Transferencia
          </label>
        </div>
      </div>

      <br>


      <div class="field is-grouped is-grouped-centered">
        <div class="control">
          <button class="button is-success">Enviar Pedido</button>
        </div>
        <div class="control">
          <button class="button is-danger is-light">Cancelar</button>
        </div>
      </div>
    </div>
  </section>
</body>
</html>
